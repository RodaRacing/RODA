<svg width="1080" height="340" viewBox="0 0 1080 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f5f5f"/>
      <stop offset="45%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#3d3d3d"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e00"/>
      <stop offset="100%" stop-color="#8d1200"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g transform="translate(16,16)" filter="url(#shadow)">
    <g fill="url(#metal)" stroke="#1f1f1f" stroke-width="3">
      <circle cx="130" cy="154" r="84" fill="none" stroke-width="12"/>
      <rect x="122" y="20" width="16" height="34" rx="4"/>
      <rect x="122" y="254" width="16" height="34" rx="4"/>
      <rect x="20" y="146" width="34" height="16" rx="4"/>
      <rect x="206" y="146" width="34" height="16" rx="4"/>
      <rect x="48" y="58" width="16" height="34" rx="4" transform="rotate(-45 48 58)"/>
      <rect x="196" y="220" width="16" height="34" rx="4" transform="rotate(-45 196 220)"/>
      <rect x="196" y="58" width="16" height="34" rx="4" transform="rotate(45 196 58)"/>
      <rect x="48" y="220" width="16" height="34" rx="4" transform="rotate(45 48 220)"/>
    </g>
  </g>

  <g transform="translate(250,70) skewX(-12)">
    <text x="0" y="90" font-family="Arial Black, Impact, sans-serif" font-size="118" letter-spacing="2" fill="url(#metal)" stroke="#1f1f1f" stroke-width="4">RODA</text>
    <text x="0" y="210" font-family="Arial Black, Impact, sans-serif" font-size="130" letter-spacing="2" fill="url(#red)" stroke="#4b0700" stroke-width="4">RACING</text>
  </g>
</svg>
